[global]
   workgroup = WORKGROUP
   server string = ByteBay
   server role = standalone server
   security = user
   map to guest = Never
   server min protocol = SMB2
   client min protocol = SMB2
   ntlm auth = ntlmv2-only
   lanman auth = no
   log file = /var/log/samba/log.%m
   max log size = 50
   dns proxy = no
   include = /etc/samba/smb.conf.d/bytebay.conf
